name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: browser, OS, self-hosted vs. local
  - type: textarea
    id: extra
    attributes:
      label: Logs / screenshots
