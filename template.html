<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Verify your email</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f6f7f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        .container {
            width: 600px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            border: 1px solid #ececec;
            border-radius: 20px;
            overflow: hidden;
        }

        .hero {
            display: block;
            width: 100%;
        }

        .heading {
            font-size: 40px;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        .text {
            font-size: 18px;
            line-height: 30px;
            color: #6b7280;
        }

        .otp-card {
            border: 1px solid #ececec;
            border-radius: 18px;
            padding: 40px;
            background: #fafafa;
        }

        .otp-title {
            color: #6b7280;
            font-size: 18px;
            margin-bottom: 24px;
        }

        .otp {
            font-size: 54px;
            letter-spacing: 18px;
            font-weight: 700;
            color: #111827;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        .divider {
            border-top: 1px solid #ececec;
            margin: 40px 0;
        }

        .footer {
            color: #9ca3af;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <table width="100%" bgcolor="#F6F7F9" cellpadding="40">

        <tr>
            <td align="center">

                <table class="container">

                    <tr>
                        <td class="card">

                            <!-- HERO -->

                            <img class="hero" src="https://YOUR_CDN/orqly-banner.png" alt="Verify your email">

                        </td>
                    </tr>

                    <tr>
                        <td height="32"></td>
                    </tr>

                    <tr>

                        <td class="card" style="padding:56px;">

                            <h1 class="heading">
                                Verify your email
                            </h1>

                            <div style="height:18px"></div>

                            <div class="text">
                                Enter this verification code to continue.
                            </div>

                            <div style="height:40px"></div>

                            <div class="otp-card">

                                <div class="otp-title">
                                    Your verification code
                                </div>

                                <div class="otp">
                                    {{OTP}}
                                </div>

                            </div>

                            <div style="height:32px"></div>

                            <div class="text">
                                This code expires in
                                <strong style="color:#FF5A19;">
                                    10 minutes
                                </strong>.
                            </div>

                            <div style="height:18px"></div>

                            <div class="text">
                                If you didn't request this email, you can safely ignore it.
                            </div>

                            <div class="divider"></div>

                            <div class="text">
                                Never share this code with anyone.
                            </div>

                        </td>

                    </tr>

                    <tr>

                        <td align="center" style="padding:40px;">

                            <div class="footer">
                                © 2026 Orqly. All rights reserved.
                            </div>

                        </td>

                    </tr>

                </table>

            </td>

        </tr>

    </table>

</body>

</html>
